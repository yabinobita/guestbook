<script>
    // 1. 先填寫配置
        const firebaseConfig = {
            apiKey: "AIzaSyATYhMbLZLIVJNeXf_RTjBLaIir-7BYgT4",
            authDomain: "guestbook-ee87a.firebaseapp.com",
            databaseURL: "https://guestbook-ee87a.firebaseio.com",
            projectId: "guestbook-ee87a",
            storageBucket: "guestbook-ee87a.appspot.com",
            messagingSenderId: "...",
            appId: "..."
        };

    // 2. 接著立刻「初始化」並定義 db (這是關鍵！必須放在 send 函式之前)
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref("msgs"); 

    // 3. 定義監聽功能 (即時顯示留言)
    db.on("child_added", (snapshot) => {
        const data = snapshot.val();
        const div = document.createElement("div");
        div.className = "msg";
        div.innerHTML = `<strong>${data.name}</strong>: ${data.text}`;
        document.getElementById("messages").appendChild(div);
    });

    // 4. 最後才定義 send 函式
    function send() {
        const name = document.getElementById("name").value || "匿名";
        const text = document.getElementById("content").value;
        if (text) {
            // 此時 send 就能抓到上面已經定義好的 db 了
            db.push({ name: name, text: text });
            document.getElementById("content").value = ""; 
        }
    }
</script>
