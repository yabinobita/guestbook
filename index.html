<script>
    // 1. 先填寫配置
        const firebaseConfig = {
            apiKey: "AIzaSyATYhMbLZLIVJNeXf_RTjBLaIir-7BYgT4",
            authDomain: "guestbook-ee87a.firebaseapp.com",
            databaseURL: "https://guestbook-ee87a.firebaseio.com",
            projectId: "guestbook-ee87a",
            storageBucket: "guestbook-ee87a.appspot.com",
            messagingSenderId: "...",
            appId: "..."
        };

    // 2. 務必先「初始化」並定義 db 變數 (放在最外面)
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref("msgs"); // 這行一定要在 send() 函數的前面

    // 3. 監聽資料 (即時呈現)
    db.on("child_added", (snapshot) => {
        const data = snapshot.val();
        const div = document.createElement("div");
        div.className = "msg";
        div.innerHTML = `<strong>${data.name}</strong>: ${data.text}`;
        document.getElementById("messages").appendChild(div);
        const msgBox = document.getElementById("messages");
        msgBox.scrollTop = msgBox.scrollHeight;
    });

    // 4. 最後才是送出函數
    function send() {
        const nameInput = document.getElementById("name");
        const contentInput = document.getElementById("content");
        const name = nameInput.value || "匿名";
        const text = contentInput.value;
        if (text) {
            // 這裡就會抓到上面定義好的 db
            db.push({ name: name, text: text }); 
            contentInput.value = ""; 
        }
    }
</script>
